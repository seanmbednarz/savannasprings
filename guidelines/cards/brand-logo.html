<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); }
  .row { display: flex; gap: 16px; }
  .panel { flex: 1; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; height: 150px; box-shadow: var(--shadow-sm); }
  .panel img { width: 76%; height: auto; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 8px; }
</style>
</head>
<body>
  <div class="row">
    <div>
      <div class="panel" style="background:var(--surface)"><img src="../../assets/logo-savanna-springs.png" alt="Savanna Springs"></div>
      <div class="lbl">on white</div>
    </div>
    <div>
      <div class="panel" style="background:var(--spring-100)"><img src="../../assets/logo-savanna-springs.png" alt="Savanna Springs"></div>
      <div class="lbl">on spring tint</div>
    </div>
    <div>
      <div class="panel" style="background:var(--sun-400)"><img src="../../assets/logo-savanna-springs.png" alt="Savanna Springs"></div>
      <div class="lbl">on sun yellow</div>
    </div>
  </div>
</body>
</html>
