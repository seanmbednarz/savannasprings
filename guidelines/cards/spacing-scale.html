<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base · used for padding, gaps & layout" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { text-align: center; }
  .bar { background: var(--spring-400); border-radius: var(--radius-xs); width: 100%; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 8px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:8px;width:8px"></div><div class="tok">1 · 4</div></div>
    <div class="item"><div class="bar" style="height:16px;width:16px"></div><div class="tok">2 · 8</div></div>
    <div class="item"><div class="bar" style="height:24px;width:24px"></div><div class="tok">3 · 12</div></div>
    <div class="item"><div class="bar" style="height:32px;width:32px"></div><div class="tok">4 · 16</div></div>
    <div class="item"><div class="bar" style="height:48px;width:48px"></div><div class="tok">5 · 24</div></div>
    <div class="item"><div class="bar" style="height:64px;width:64px"></div><div class="tok">6 · 32</div></div>
    <div class="item"><div class="bar" style="height:80px;width:80px"></div><div class="tok">7 · 40</div></div>
  </div>
</body>
</html>
