<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 0; background: var(--surface); }
  .hero { background: var(--navy-700); padding: 30px 32px; position: relative; overflow: hidden; height: 230px; box-sizing: border-box; }
  .eyebrow { font-family: var(--font-display); font-weight: 700; font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--spring-300); }
  h2 { font-family: var(--font-display); font-weight: 800; font-size: 38px; line-height: 1.05; color: #fff; margin: 10px 0 0; max-width: 60%; }
  h2 .hl { color: var(--sun-400); }
  .btn { display: inline-block; margin-top: 18px; background: var(--sun-400); color: var(--navy-900); font-family: var(--font-display); font-weight: 700; font-size: 15px; padding: 12px 22px; border-radius: var(--radius-pill); box-shadow: var(--shadow-accent); }
  .blob { position: absolute; border-radius: 50%; }
  .b1 { width: 240px; height: 240px; background: var(--spring-500); opacity: .55; right: -60px; top: -70px; }
  .b2 { width: 150px; height: 150px; background: var(--orange-500); opacity: .85; right: 60px; bottom: -60px; }
</style>
</head>
<body>
  <div class="hero">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="eyebrow">We make one thing perfectly clear</div>
    <h2>Better water, <span class="hl">made simple.</span></h2>
    <span class="btn">Get a free water test</span>
  </div>
</body>
</html>
