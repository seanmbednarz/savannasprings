<!-- @dsCard group="Colors" viewport="700x130" name="Spring Blue Scale" subtitle="Clean-water secondary · 400 is the water accent" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface); }
  .scale { display: flex; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .step { flex: 1; height: 76px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; font-family: var(--font-mono); font-size: 11px; }
  .lt { color: var(--spring-900); }
  .dk { color: #fff; }
  .core { outline: 3px solid var(--navy-700); outline-offset: -3px; }
</style>
</head>
<body>
  <div class="scale">
    <div class="step lt" style="background:var(--spring-50)">50</div>
    <div class="step lt" style="background:var(--spring-100)">100</div>
    <div class="step lt" style="background:var(--spring-200)">200</div>
    <div class="step lt" style="background:var(--spring-300)">300</div>
    <div class="step lt core" style="background:var(--spring-400)">400</div>
    <div class="step dk" style="background:var(--spring-500)">500</div>
    <div class="step dk" style="background:var(--spring-600)">600</div>
    <div class="step dk" style="background:var(--spring-700)">700</div>
    <div class="step dk" style="background:var(--spring-800)">800</div>
    <div class="step dk" style="background:var(--spring-900)">900</div>
  </div>
</body>
</html>
