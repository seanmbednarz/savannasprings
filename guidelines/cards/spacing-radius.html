<!-- @dsCard group="Spacing" viewport="700x170" name="Radius" subtitle="Rounded & friendly — sm to pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 84px; height: 70px; background: var(--navy-50); border: 2px solid var(--navy-300); }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 8px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="tok">sm · 8</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="tok">md · 12</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="tok">lg · 18</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="tok">xl · 26</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="tok">2xl · 36</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="tok">pill</div></div>
  </div>
</body>
</html>
