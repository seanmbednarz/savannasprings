<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
  .chip { height: 92px; }
  .meta { padding: 10px 12px; background: var(--surface); }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--text-heading); }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--navy-700)"></div><div class="meta"><div class="name">Navy</div><div class="hex">#1F2B6E</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--spring-400)"></div><div class="meta"><div class="name">Spring Blue</div><div class="hex">#49ADE4</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--sun-400)"></div><div class="meta"><div class="name">Sun Yellow</div><div class="hex">#FCCA21</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--orange-500)"></div><div class="meta"><div class="name">Duck Orange</div><div class="hex">#F5851F</div></div></div>
  </div>
</body>
</html>
