<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="Major-third ramp, 11 → 76px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); }
  .line { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--border); padding: 6px 0; }
  .line:last-child { border-bottom: none; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 120px; flex: none; }
  .demo { font-family: var(--font-display); font-weight: 700; color: var(--navy-800); line-height: 1.1; white-space: nowrap; }
</style>
</head>
<body>
  <div class="line"><span class="tok">4xl · 60</span><span class="demo" style="font-size:60px">Clean</span></div>
  <div class="line"><span class="tok">3xl · 46</span><span class="demo" style="font-size:46px">Soft water</span></div>
  <div class="line"><span class="tok">2xl · 36</span><span class="demo" style="font-size:36px">Free water analysis</span></div>
  <div class="line"><span class="tok">xl · 28</span><span class="demo" style="font-size:28px">Impression Plus Series</span></div>
  <div class="line"><span class="tok">lg · 22</span><span class="demo" style="font-size:22px">Salt delivery, the better way</span></div>
  <div class="line"><span class="tok">base · 16</span><span class="demo" style="font-size:16px;font-weight:500">Body copy and controls</span></div>
</body>
</html>
