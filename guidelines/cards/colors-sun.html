<!-- @dsCard group="Colors" viewport="700x130" name="Sun Yellow & Orange" subtitle="The duck accents · 400 yellow + 500 orange are brand spark colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface); }
  .scale { display: flex; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .step { flex: 1; height: 76px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; font-family: var(--font-mono); font-size: 11px; color: var(--navy-900); }
  .core { outline: 3px solid var(--navy-700); outline-offset: -3px; }
  .dk { color:#fff; }
</style>
</head>
<body>
  <div class="scale">
    <div class="step" style="background:var(--sun-100)">100</div>
    <div class="step" style="background:var(--sun-200)">200</div>
    <div class="step" style="background:var(--sun-300)">300</div>
    <div class="step core" style="background:var(--sun-400)">400</div>
    <div class="step" style="background:var(--sun-500)">500</div>
    <div class="step" style="background:var(--orange-400)">o400</div>
    <div class="step core" style="background:var(--orange-500)">o500</div>
    <div class="step dk" style="background:var(--orange-600)">o600</div>
    <div class="step dk" style="background:var(--orange-700)">o700</div>
  </div>
</body>
</html>
