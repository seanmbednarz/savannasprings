<!-- @dsCard group="Colors" viewport="700x130" name="Neutrals" subtitle="Cool gray ramp for text, borders & surfaces" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface); }
  .scale { display: flex; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
  .step { flex: 1; height: 76px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; font-family: var(--font-mono); font-size: 11px; }
  .lt { color: var(--neutral-700); }
  .dk { color:#fff; }
</style>
</head>
<body>
  <div class="scale">
    <div class="step lt" style="background:var(--neutral-0)">0</div>
    <div class="step lt" style="background:var(--neutral-50)">50</div>
    <div class="step lt" style="background:var(--neutral-100)">100</div>
    <div class="step lt" style="background:var(--neutral-200)">200</div>
    <div class="step lt" style="background:var(--neutral-300)">300</div>
    <div class="step lt" style="background:var(--neutral-400)">400</div>
    <div class="step dk" style="background:var(--neutral-500)">500</div>
    <div class="step dk" style="background:var(--neutral-600)">600</div>
    <div class="step dk" style="background:var(--neutral-700)">700</div>
    <div class="step dk" style="background:var(--neutral-800)">800</div>
    <div class="step dk" style="background:var(--neutral-900)">900</div>
  </div>
</body>
</html>
