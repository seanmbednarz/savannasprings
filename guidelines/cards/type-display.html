<!-- @dsCard group="Type" viewport="700x230" name="Display — Outfit" subtitle="Headlines & display · geometric, friendly, modern" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--surface); }
  .eyebrow { font-family: var(--font-display); font-weight: 700; font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--spring-600); margin-bottom: 10px; }
  .big { font-family: var(--font-display); font-weight: 800; font-size: 58px; line-height: 1.0; letter-spacing: -.02em; color: var(--navy-700); margin: 0; }
  .sub { font-family: var(--font-display); font-weight: 600; font-size: 24px; color: var(--navy-900); margin: 12px 0 0; }
  .specs { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 14px; }
</style>
</head>
<body>
  <div class="eyebrow">We make one thing perfectly clear</div>
  <h1 class="big">Better water,<br>made simple.</h1>
  <div class="sub">Outfit · 800 / 600 · tight tracking</div>
  <div class="specs">var(--font-display) — Outfit · weights 300–800</div>
</body>
</html>
