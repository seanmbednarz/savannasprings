<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--surface); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px 26px; max-width: 640px; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Select, Checkbox, Switch } = window.SavannaSpringsDesignSystem_15883b;
const Mail = () => <svg viewBox="0 0 24 24" width="100%" height="100%" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>;
function App() {
  return (
    <div className="grid">
      <div className="stack">
        <Input label="Full name" placeholder="Jane Smith" />
        <Input label="Email" type="email" iconLeft={<Mail/>} hint="We'll never share it." />
      </div>
      <div className="stack">
        <Select label="I'm interested in" placeholder="Choose a product" defaultValue="">
          <option>Water softener</option>
          <option>Drinking water (R.O.)</option>
          <option>Salt delivery</option>
        </Select>
        <Input label="ZIP code" defaultValue="123" error="Please enter a valid ZIP." />
      </div>
      <div className="stack">
        <Checkbox label="Add free salt delivery" defaultChecked />
        <Checkbox label="Subscribe to specials" />
      </div>
      <div className="stack">
        <Switch label="Auto-renew my rental" defaultChecked />
        <Switch label="Paperless billing" size="sm" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
